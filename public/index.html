// ── Member Toggle Button ──────────────────────────────────────
function MemberBtn({m, voted, onToggle}){

    <button onClick={onToggle} title={voted?"✓ "+m.name+" — اضغط للإلغاء":m.name}
      style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,
        padding:"6px 2px 5px",borderRadius:10,cursor:"pointer",outline:"none",
        border:"2px solid "+(voted?m.c:"#1e1e1e"),
        background:voted?m.c+"22":"#0e0e0e",transition:"all .15s"}}>
      <div style={{width:28,height:28,borderRadius:"50%",
        background:voted?m.c:"#1a1a1a",
        display:"flex",alignItems:"center",justifyContent:"center",
        fontSize:9,fontWeight:800,color:voted?"#fff":"#2a2a2a",
        boxShadow:voted?"0 2px 8px "+m.c+"66":"none"}}>

        {m.name.split(" ")[0]}
      </div>
    </button>
  );
}

// ── Card ──────────────────────────────────────────────────────

  const pct    = Math.round(count/N*100);
  const perM   = r.monthly>0 ? Math.ceil(r.monthly/N) : null;
  const perY   = r.annual>0  ? Math.ceil(r.annual/N)  : null;

  return(
    <div style={{background:"#0f0f0f",borderRadius:16,overflow:"hidden",
      border:"1.5px solid "+(count>0?r.ac+"77":"#181818"),
      display:"flex",flexDirection:"column",transition:"border-color .3s"}}>

      {/* header strip */}
      <div style={{height:5,background:"linear-gradient(90deg,"+r.ac+","+r.ac+"44)"}}/>

      <div style={{padding:"11px 12px 10px",flex:1}}>
        {/* region + area badges */}
        <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:6,alignItems:"center"}}>
          <span style={{background:regionColor(r.region)+"22",border:"1px solid "+regionColor(r.region)+"44",color:regionColor(r.region),fontSize:9,fontWeight:800,padding:"2px 7px",borderRadius:100}}>

        </div>

        {/* title */}
        <div style={{fontFamily:"Cairo,sans-serif",fontSize:13,fontWeight:800,color:"#e8e3dc",lineHeight:1.35,marginBottom:8}}>
          {r.name}
        </div>

        {/* price block */}

          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:6}}>

                  : fmt(r.annual)+"/سنة"}

            </div>
            {(perM||perY)&&(
              <div style={{textAlign:"left"}}>
                <div style={{fontSize:8,color:"#333",marginBottom:2}}>القسط/شخص</div>
                {perM&&<div style={{fontFamily:"Cairo,sans-serif",fontSize:12,fontWeight:800,color:"#27ae60"}}>{fmt(perM)}/شهر</div>}
                {perY&&perY>0&&<div style={{fontFamily:"Cairo,sans-serif",fontSize:10,color:"#555"}}>{fmt(perY)}/سنة</div>}
              </div>
            )}

        {/* action row */}

            📋 فتح الإعلان المباشر ↗

      </div>

                {count} 🗳️
              </span>
            )}
          </div>
          {count>0&&(
            <span style={{background:"#c9a84c",color:"#000",fontFamily:"Cairo,sans-serif",fontSize:10,fontWeight:800,padding:"2px 9px",borderRadius:100}}>
              {Math.round(pct)}%
            </span>
          )}
        </div>

        {/* members grid 6+5 */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:4,marginBottom:4}}>
          {MEMBERS.slice(0,6).map(m=>(
            <MemberBtn key={m.id} m={m}
              voted={(votes[r.id]||new Set()).has(m.id)}
              onToggle={()=>onToggle(r.id,m.id)}/>

        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:4}}>
          {MEMBERS.slice(6).map(m=>(
            <MemberBtn key={m.id} m={m}
              voted={(votes[r.id]||new Set()).has(m.id)}
              onToggle={()=>onToggle(r.id,m.id)}/>

        </div>

        {/* progress + voter chips */}
        {count>0&&(
          <>
            <div style={{marginTop:8,height:3,background:"#181818",borderRadius:100,overflow:"hidden"}}>
              <div style={{height:"100%",width:pct+"%",background:"linear-gradient(90deg,"+r.ac+","+r.ac+"66)",borderRadius:100,transition:"width .4s"}}/>
            </div>
            <div style={{marginTop:5,display:"flex",flexWrap:"wrap",gap:3}}>
              {voters.map(m=>(
                <span key={m.id} style={{background:m.c+"18",border:"1px solid "+m.c+"44",color:m.c,fontSize:8.5,fontWeight:700,padding:"1px 6px",borderRadius:100}}>
                  {m.name.split(" ")[0]}

            </div>
          </>
        )}
      </div>
    </div>

    m,
    picks: LISTINGS.filter(r=>(votes[r.id]||new Set()).has(m.id))
  }));

  return(
    <div style={{maxWidth:740,margin:"0 auto",padding:"18px 14px"}}>
      <div style={{fontFamily:"Cairo,sans-serif",fontSize:17,fontWeight:800,color:"#e8e3dc",marginBottom:5}}>
        📊 نتائج التصويت
      </div>
      <div style={{color:"#2a2a2a",fontSize:11,marginBottom:16}}>
        {totalVotes} صوت إجمالي · {ranked.length} استراحة حصلت على أصوات
      </div>

      {totalVotes===0&&(
        <div style={{textAlign:"center",padding:"50px 0",color:"#1a1a1a"}}>
          <div style={{fontSize:36,marginBottom:10}}>🗳️</div>
          <div style={{fontFamily:"Cairo,sans-serif",fontSize:13}}>لا توجد أصوات حتى الآن</div>
        </div>
      )}

      {ranked.map((r,i)=>{
        const v=vc(r.id);
        const pct=totalVotes>0?Math.round(v/totalVotes*100):0;
        const voterList=MEMBERS.filter(m=>(votes[r.id]||new Set()).has(m.id));
        const win=i===0;
        const perM=r.monthly>0?Math.ceil(r.monthly/N):null;
        const perY=r.annual>0?Math.ceil(r.annual/N):null;
        return(
          <div key={r.id} style={{
            background:win?"rgba(201,168,76,.06)":"#0c0c0c",
            border:"1.5px solid "+(win?"#c9a84c66":"#161616"),
            borderRadius:14,padding:"12px 13px",marginBottom:10}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:9}}>
              <div style={{fontFamily:"Cairo,sans-serif",fontSize:22,fontWeight:900,color:"#c9a84c",minWidth:28,textAlign:"center"}}>
                {win?"🏆":i+1}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontFamily:"Cairo,sans-serif",fontSize:12,fontWeight:800,color:"#e8e3dc",marginBottom:4,lineHeight:1.3}}>
                  {r.name}
                </div>
                <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:4}}>
                  <span style={{background:r.ac+"18",color:r.ac,fontSize:9,padding:"1px 6px",borderRadius:100,fontWeight:700}}>{r.area}</span>
                  <TypeBadge type={r.type}/>
                </div>
                <div style={{display:"flex",flexWrap:"wrap",gap:3,marginBottom:4}}>
                  {voterList.map(m=>(
                    <span key={m.id} style={{background:m.c+"18",border:"1px solid "+m.c+"44",color:m.c,fontSize:9,fontWeight:700,padding:"1px 6px",borderRadius:100}}>
                      {m.name.split(" ")[0]}
                    </span>
                  ))}
                </div>
                <div style={{height:4,background:"#181818",borderRadius:100,overflow:"hidden"}}>
                  <div style={{height:"100%",width:pct+"%",background:"linear-gradient(90deg,"+r.ac+","+r.ac+"77)",borderRadius:100,transition:"width .5s"}}/>
                </div>
              </div>
              <div style={{textAlign:"center",minWidth:38}}>
                <div style={{fontFamily:"Cairo,sans-serif",fontSize:22,fontWeight:900,color:r.ac}}>
                  {v}
                </div>
                <div style={{fontSize:8,color:"#2a2a2a"}}>صوت</div>
              </div>
            </div>

            {/* cost breakdown + link */}
            <div style={{background:"#080808",borderRadius:10,padding:"7px 9px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
              <div style={{display:"flex",gap:14,flexWrap:"wrap"}}>
                <div style={{textAlign:"center"}}>
                  <div style={{fontSize:8,color:"#333"}}>شهري/شخص</div>
                  <div style={{fontFamily:"Cairo,sans-serif",fontSize:12,fontWeight:800,color:"#27ae60"}}>{perM?fmt(perM):"—"}</div>
                </div>
                {perY&&perY>0&&(
                  <>
                    <div style={{width:1,height:28,background:"#181818"}}/>
                    <div style={{textAlign:"center"}}>
                      <div style={{fontSize:8,color:"#333"}}>سنوي/شخص</div>
                      <div style={{fontFamily:"Cairo,sans-serif",fontSize:12,fontWeight:800,color:"#c9a84c"}}>{fmt(perY)}</div>
                    </div>
                  </>
                )}
              </div>
              <a href={r.url} target="_blank" rel="noreferrer"
                style={{display:"flex",alignItems:"center",gap:4,background:"#0a1f3d",border:"1px solid #153060",color:"#5aacff",fontFamily:"Cairo,sans-serif",fontSize:10,fontWeight:700,padding:"6px 10px",borderRadius:8,textDecoration:"none"}}>
                📋 فتح الإعلان ↗
              </a>
            </div>
          </div>
        );
      })}

      {/* per-member summary */}
      {totalVotes>0&&(
        <div style={{marginTop:20}}>
          <div style={{fontFamily:"Cairo,sans-serif",fontSize:14,fontWeight:800,color:"#e8e3dc",marginBottom:12}}>
            👥 تفصيل أصوات كل عضو
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:7}}>
            {memberVoted.map(({m,picks})=>(
              <div key={m.id} style={{background:"#0c0c0c",border:"1px solid "+(picks.length>0?m.c+"44":"#181818"),borderRadius:11,padding:"9px 10px"}}>
                <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:picks.length>0?6:0}}>
                  <div style={{width:30,height:30,borderRadius:"50%",background:picks.length>0?m.c:"#1a1a1a",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"Cairo,sans-serif",fontSize:10,fontWeight:800,color:picks.length>0?"#fff":"#222",flexShrink:0}}>
                    {picks.length>0?picks.length:m.ini}
                  </div>
                  <div>
                    <div style={{fontFamily:"Cairo,sans-serif",fontSize:11,fontWeight:800,color:"#bbb"}}>{m.name}</div>
                    <div style={{fontSize:9,color:picks.length>0?m.c:"#222"}}>
                      {picks.length>0?picks.length+" صوت":"لم يصوّت بعد"}
                    </div>
                  </div>
                </div>
                {picks.map(p=>(
                  <div key={p.id} style={{background:p.ac+"10",border:"1px solid "+p.ac+"22",borderRadius:7,padding:"3px 7px",marginTop:4}}>
                    <div style={{fontFamily:"Cairo,sans-serif",fontSize:9,fontWeight:700,color:p.ac}}>{p.area}</div>
                    <div style={{fontSize:8,color:"#2a2a2a",lineHeight:1.3}}>{p.name.split("·")[0].trim()}</div>
                  </div>
                ))}
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ── App ─────────────────────────────────────────────────────
const API = "/api/votes";  // same-origin — no CORS issues

const toPlain   = v => Object.fromEntries(Object.entries(v).map(([k,s])=>[k,[...s]]));
const fromPlain = o => Object.fromEntries(Object.entries(o).map(([k,a])=>[k, new Set(a)]));

async function getVotes() {
  const r = await fetch(API);
  const d = await r.json();
  return d.votes || {};
}

async function saveVotes(plain) {
  await fetch(API, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ votes: plain })
  });
}

function App(){
  const [votes,      setVotes]      = useState({});
  const [loading,    setLoading]    = useState(true);
  const [syncStatus, setSyncStatus] = useState("idle");
  const [tab,        setTab]        = useState(0);
  const [regF,       setRegF]       = useState("\u0627\u0644\u0643\u0644");
  const [areaF,      setAreaF]      = useState("\u0627\u0644\u0643\u0644");
  const [typeF,      setTypeF]      = useState("\u0627\u0644\u0643\u0644");
  const [sort,       setSort]       = useState("votes");

  const loadVotes = useCallback(async () => {
    try {
      const plain = await getVotes();
      setVotes(fromPlain(plain));
      setSyncStatus("ok");
    } catch {
      setSyncStatus("error");
    } finally {
      setLoading(false);
    }
  }, []);

  useEffect(() => {
    loadVotes();
    const iv = setInterval(loadVotes, 6000);
    return () => clearInterval(iv);
  }, [loadVotes]);

  const onToggle = useCallback((lid, mid) => {
    setVotes(prev => {
      const newSet = new Set(prev[lid] || []);
      if (newSet.has(mid)) newSet.delete(mid);
      else                  newSet.add(mid);
      const next = { ...prev, [lid]: newSet };
      setSyncStatus("saving");
      saveVotes(toPlain(next))
        .then(() => setSyncStatus("ok"))
        .catch(() => setSyncStatus("error"));
      return next;
    });
  }, []);

  const totalVotes  = Object.values(votes).reduce((s,v)=>s+v.size, 0);
  const totalVoters = new Set(Object.values(votes).flatMap(s=>[...s])).size;
  const syncInfo = {
    idle:   { label: "",           color: "#555"    },
    saving: { label: "⏳ حفظ…",   color: "#c9a84c" },
    ok:     { label: "✅ Synced",  color: "#27ae60" },
    error:  { label: "⚠️ خطأ",    color: "#e74c3c" },
  }[syncStatus];

  if (loading) return (
    <div style={{minHeight:"100vh",background:"#080808",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}>
      <div style={{fontSize:40}}>🏡</div>
      <div style={{fontFamily:"Cairo,sans-serif",fontSize:14,color:"#555"}}>جاري التحميل…</div>
    </div>
  );

  const TABS=["🏡 الخيارات","📊 النتائج"];
  const REGIONS=["الكل","شمال","شرق","جنوب"];
  const TYPES=["الكل","سنوي","شهري"];

  let filtered = LISTINGS.filter(r=>{
    if(regF!=="الكل"&&r.region!==regF) return false;
    if(areaF!=="الكل"&&r.area!==areaF) return false;
    if(typeF!=="الكل"&&r.type!==typeF) return false;
    return true;
  });
  filtered=[...filtered].sort((a,b)=>{
    if(sort==="votes") return (votes[b.id]||new Set()).size-(votes[a.id]||new Set()).size;
    const pa=a.type==="شهري"?a.monthly*12:a.annual,pb=b.type==="شهري"?b.monthly*12:b.annual;
    if(!pa)return 1;if(!pb)return -1;
    return sort==="price_asc"?pa-pb:pb-pa;
  });

  const FB=({val,cur,set,label})=>(
    <button onClick={()=>set(val)} style={{background:cur===val?"#c9a84c":"#0f0f0f",border:"1px solid "+(cur===val?"#c9a84c":"#1c1c1c"),color:cur===val?"#000":"#383838",fontFamily:"Cairo,sans-serif",fontSize:10,fontWeight:cur===val?800:400,padding:"4px 11px",borderRadius:100,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>{label}</button>
  );

  return(
    <div style={{minHeight:"100vh",background:"#080808",color:"#e0ddd8",fontFamily:"Tajawal,Arial,sans-serif",direction:"rtl"}}>
      <div style={{background:"linear-gradient(160deg,#060606,#100a00,#060606)",padding:"20px 14px 14px",textAlign:"center",borderBottom:"1px solid #111"}}>
        <div style={{fontFamily:"Cairo,sans-serif",fontSize:"clamp(20px,5vw,32px)",fontWeight:900,color:"#c9a84c",marginBottom:4}}>🏡 تصويت الاستراحة</div>
        {syncInfo.label&&<div style={{fontSize:10,color:syncInfo.color,marginBottom:6,fontWeight:600}}>{syncInfo.label}</div>}
        <div style={{display:"flex",justifyContent:"center",gap:8,flexWrap:"wrap",marginBottom:14}}>
          {[["#c9a84c","📋 سنوي ≤٤٥ألف"],["#27ae60","📅 شهري ≤٦ألف"],["#5aacff","👍 تصويت متعدد"]].map(([c,t])=>(
            <span key={t} style={{background:c+"11",border:"1px solid "+c+"33",color:c,padding:"4px 11px",borderRadius:100,fontSize:10,fontWeight:700}}>{t}</span>
          ))}
        </div>
        <div style={{display:"inline-flex",gap:24,background:"#0d0d0d",borderRadius:14,border:"1px solid #181818",padding:"10px 20px"}}>
          {[[LISTINGS.length,"استراحة"],[totalVotes,"صوت"],[totalVoters,"مصوّت"],[N-totalVoters,"لم يصوّت"]].map(([n,l])=>(
            <div key={l}><div style={{fontFamily:"Cairo,sans-serif",fontSize:19,fontWeight:900,color:"#c9a84c"}}>{n}</div><div style={{fontSize:9,color:"#252525"}}>{l}</div></div>
          ))}
        </div>
      </div>
      <div style={{display:"flex",background:"#060606",borderBottom:"1px solid #111",position:"sticky",top:0,zIndex:20}}>
        {TABS.map((t,i)=>(
          <button key={i} onClick={()=>setTab(i)} style={{flex:1,padding:"12px 4px",fontFamily:"Cairo,sans-serif",fontSize:12,fontWeight:700,color:tab===i?"#c9a84c":"#222",background:"none",border:"none",borderBottom:"2.5px solid "+(tab===i?"#c9a84c":"transparent"),cursor:"pointer"}}>{t}</button>
        ))}
      </div>
      {tab===0&&(<>
        <div style={{background:"#060606",borderBottom:"1px solid #111",padding:"8px 12px",display:"flex",flexDirection:"column",gap:6}}>
          <div style={{display:"flex",gap:4,overflowX:"auto",scrollbarWidth:"none",alignItems:"center"}}>
            <span style={{color:"#1e1e1e",fontSize:9,lineHeight:"26px",flexShrink:0}}>المنطقة:</span>
            {REGIONS.map(r=><FB key={r} val={r} cur={regF} set={v=>{setRegF(v);setAreaF("الكل");}} label={r==="الكل"?"🗺 الكل":"🧭 "+r}/>)}
          </div>
          <div style={{display:"flex",gap:4,overflowX:"auto",scrollbarWidth:"none",alignItems:"center"}}>
            <span style={{color:"#1e1e1e",fontSize:9,lineHeight:"26px",flexShrink:0}}>الحي:</span>
            {(regF==="الكل"?["الكل",...new Set(LISTINGS.map(r=>r.area))]:["الكل",...new Set(LISTINGS.filter(r=>r.region===regF).map(r=>r.area))]).map(a=><FB key={a} val={a} cur={areaF} set={setAreaF} label={a==="الكل"?"الكل":a}/>)}
          </div>
          <div style={{display:"flex",gap:4,overflowX:"auto",scrollbarWidth:"none",alignItems:"center"}}>
            <span style={{color:"#1e1e1e",fontSize:9,lineHeight:"26px",flexShrink:0}}>الإيجار:</span>
            {TYPES.map(t=><FB key={t} val={t} cur={typeF} set={setTypeF} label={t==="الكل"?"الكل":t==="سنوي"?"📋 سنوي":"📅 شهري"}/>)}
            <span style={{color:"#1e1e1e",fontSize:9,lineHeight:"26px",flexShrink:0,marginRight:6}}>ترتيب:</span>
            <FB val="votes" cur={sort} set={setSort} label="🗳️ الأصوات"/>
            <FB val="price_asc" cur={sort} set={setSort} label="💰 الأرخص"/>
            <FB val="price_desc" cur={sort} set={setSort} label="💎 الأغلى"/>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(272px,1fr))",gap:10,padding:"8px 12px 24px",maxWidth:1300,margin:"0 auto"}}>
          {filtered.map(r=><Card key={r.id} r={r} votes={votes} onToggle={onToggle}/>)}
        </div>
      </>)}
      {tab===1&&<Results votes={votes}/>}
      <div style={{textAlign:"center",padding:"10px",color:"#1a1a1a",fontSize:8.5,borderTop:"1px solid #0e0e0e"}}>
        🔄 تتحدث كل ٦ ثواني · ✅ مشترك بين الجميع · بدون تسجيل دخول
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
